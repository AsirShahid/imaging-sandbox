# Internal app router for the imaging sandbox.
#
# This is NOT the public/TLS proxy — Nginx Proxy Manager stays the edge and
# terminates TLS, then forwards the domain here. Two jobs only:
#   1. Same-origin path routing so OHIF can call DICOMweb with zero CORS.
#   2. A hard read-only guard on the PUBLIC DICOMweb endpoint.
#
# Admin/write access to Orthanc does NOT go through here — it goes through the
# loopback-published admin port (127.0.0.1:8042) over an SSH tunnel.

upstream ohif    { server ohif:80; }
upstream orthanc { server orthanc:8042; }
upstream api     { server api:8000; }

# Co-tenant / DoS protection for the public compute API. The /api/ surface is
# unauthenticated and some endpoints do real work (recon enqueue, scikit-image
# metrics), so cap how fast and how concurrently it can be hit.
#
# NOTE: behind Nginx Proxy Manager every request arrives from NPM's container IP,
# so $binary_remote_addr is effectively constant here and these become a GLOBAL
# throttle on /api/ — which is what co-tenant protection wants. For true
# per-client limits, add the real_ip module trusting ONLY NPM's address and key
# these zones off the recovered client IP instead.
limit_req_zone  $binary_remote_addr zone=api_rate:10m rate=10r/s;
limit_conn_zone $binary_remote_addr zone=api_conn:10m;
limit_req_status 429;
limit_conn_status 429;

server {
    listen 80;
    server_name _;

    client_max_body_size 0;          # stream large WADO-RS responses
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;

    # Marks every request that arrives via the public edge. Orthanc's guard
    # plugin (orthanc/private_guard.py) uses this to hide/deny `private`-labelled
    # studies (e.g. ADNI). It's force-set here so a client can't spoof it, and
    # admin ingest bypasses this proxy entirely (loopback 127.0.0.1:8042), so it
    # never carries the header and keeps full access. Inert for ohif/api.
    proxy_set_header X-Public-Access 1;

    # ---- FastAPI sandbox API (/api/* -> service root) ----
    location /api/ {
        limit_req  zone=api_rate burst=20 nodelay;
        limit_conn api_conn 16;
        proxy_pass http://api/;
    }

    # ---- DICOMweb (Orthanc): PUBLIC, READ-ONLY + private-data guard ----
    # Only safe verbs reach Orthanc (STOW/DELETE/modify => 403), AND studies
    # labelled `private` are kept off the public edge by the guard plugin.

    # Cross-study QIDO listings would leak private-study metadata and the viewer
    # never needs them (it always drills study -> series -> instances), so close
    # them on the public path.
    location = /dicom-web/series    { return 404; }
    location = /dicom-web/instances { return 404; }

    # Study LIST: served filtered by the guard plugin (private studies removed)
    # so they never appear in the public study browser.
    location = /dicom-web/studies {
        limit_except GET HEAD OPTIONS { deny all; }
        rewrite ^ /guard/qido-studies break;   # query string is preserved
        proxy_pass http://orthanc;
    }

    # Everything else under DICOMweb (per-study series/instances, /metadata,
    # WADO-RS pixels). The guard plugin returns 403 for any `private` study.
    location /dicom-web/ {
        limit_except GET HEAD OPTIONS {
            deny all;
        }
        proxy_pass http://orthanc;   # preserves the /dicom-web/ prefix
    }

    # ---- OHIF viewer (everything else) ----
    location / {
        proxy_pass http://ohif;
    }
}
